    document.addEventListener("DOMContentLoaded", () => {
      const ids = ['#speech1','#speech2','#speech3','#speech4','#speech5','#speech6'];

      tweens.forEach((t, i) => t.chain(tweens[(i + 1) % tweens.length]));
      tweens[0].start();
    });
